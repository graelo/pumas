# Any commit on main & PRs

name: 'CI: Essentials'
on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & test
    runs-on: macos-latest
    permissions:
      contents: read
    strategy:
      matrix:
        rust: [stable]
    steps:
      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Cache crates
        if: github.event_name == 'pull_request'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        continue-on-error: false
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-hash-${{ hashFiles('**/Cargo.lock') }}

      - name: Quality – cargo fmt
        run: |
          cargo fmt --all -- --check

      - name: Quality – cargo clippy
        run: |
          cargo clippy --all-targets -- -D warnings

      - name: Quality – convco check
        run: |
          git show-ref
          echo Commit message: "$(git log -1 --pretty=%B)"
          curl -sSfLO https://github.com/convco/convco/releases/latest/download/convco-macos.zip
          unzip convco-macos.zip
          chmod +x convco
          ./convco --version
          ./convco check -c .convco
          rm convco

      - name: Build (dev)
        run: cargo build --all-features

      - name: Build (release)
        run: cargo build --all-features --release

      - name: Install cargo-nextest
        uses: taiki-e/install-action@1329c298aa20c3257846c9b2e0e55967df3e3c37 # v2.75.25
        with:
          tool: cargo-nextest@0.9.133

      - name: Test
        run: ./ci/test_full.sh

  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      cargo_lock: ${{ steps.filter.outputs.cargo_lock }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            cargo_lock:
              - 'Cargo.toml'
              - 'Cargo.lock'
            workflows:
              - '.github/workflows/**'
              - '.github/actions/**'
              - '.github/poutine.yml'
              - '.github/zizmor.yml'
              - 'renovate.json'

  cargo-audit:
    needs: changes
    if: needs.changes.outputs.cargo_lock == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/_cargo-audit.yml

  ci-security:
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    permissions:
      security-events: write
      contents: read
      actions: read
    uses: ./.github/workflows/_ci-security.yml
